services:
  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: ./scrapper
    env_file: .env
    volumes:
      - ./scrapper:/app
      - ./backend:/backend
    depends_on:
      - db
      - redis
    command: celery -A tasks.celery_app worker --loglevel=info

  celery-beat:
    build: ./scrapper
    env_file: .env
    volumes:
      - ./scrapper:/app
      - ./backend:/backend
    depends_on:
      - db
      - redis
    command: celery -A tasks.celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  postgres_data:
